name: CI

env:
  NX_OUTPUT_STYLE: static

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/package-lock.json', 'nx.json', 'project.json', '**/project.json', 'tsconfig.base.json', 'eslint.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Set Nx base/head (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "NX_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - name: Set Nx base/head (push)
        if: github.event_name == 'push'
        run: |
          echo "NX_BASE=${{ github.event.before }}" >> $GITHUB_ENV
          echo "NX_HEAD=${{ github.sha }}" >> $GITHUB_ENV

      - name: Print NX_BASE/NX_HEAD
        run: |
          echo "NX_BASE=$NX_BASE"
          echo "NX_HEAD=$NX_HEAD"

    #  - name: Show affected projects (debug)
    #    run: npx nx show projects --affected --base=$NX_BASE --head=$NX_HEAD

    #  - name: Run affected checks
    #    run: npm run check:affected

      #- name: Build affected
      #  run: npm run build:affected

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E (Playwright)
        id: e2e
        run: npm run e2e:affected

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dist/.playwright/apps/**/playwright-report
          if-no-files-found: warn
          retention-days: 15

      # - name: Fail if E2E failed
      #   if: ${{ steps.e2e.outcome == 'failure' }}
      #   run: exit 1
